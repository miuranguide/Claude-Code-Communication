name: broadcaster
description: TikTok LIVE Broadcaster - Camera + Overlay + WebSocket Server
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  shared:
    path: ../../packages/shared
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  video_player: ^2.8.2
  camera: ^0.10.5+7
  just_audio: ^0.9.36
  qr_flutter: ^4.1.0
  file_picker: ^6.1.1
  permission_handler: ^11.1.0
  video_thumbnail: ^0.5.3
  path_provider: ^2.1.1
  path: ^1.8.3
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
