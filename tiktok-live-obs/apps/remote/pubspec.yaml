name: remote
description: TikTok LIVE Remote - StreamDeck-style controller
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  shared:
    path: ../../packages/shared
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  web_socket_channel: ^2.4.0
  mobile_scanner: ^4.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  permission_handler: ^11.1.0
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
