<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Live Controller</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .logo { font-size: 3rem; margin-bottom: 10px; }
    h1 { font-size: 1.8rem; margin-bottom: 8px; }
    .subtitle { color: #aaa; margin-bottom: 40px; font-size: 0.95rem; }
    .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    .card {
      background: #1a1a2e;
      border: 2px solid #333;
      border-radius: 16px;
      padding: 30px 24px;
      width: 280px;
      text-align: center;
      text-decoration: none;
      color: #fff;
      transition: all 0.3s;
    }
    .card:hover { border-color: #ff3b5c; transform: translateY(-4px); }
    .card-icon { font-size: 3rem; margin-bottom: 16px; }
    .card h2 { font-size: 1.2rem; margin-bottom: 8px; }
    .card p { color: #999; font-size: 0.85rem; line-height: 1.5; }
    .card.display { border-color: #4a90d9; }
    .card.display:hover { border-color: #69b0ff; background: #1a2a3e; }
    .card.controller:hover { background: #2e1a1e; }
    .footer { margin-top: 40px; color: #555; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="logo">🎬</div>
  <h1>TikTok Live Controller</h1>
  <p class="subtitle">配信オーバーレイ遠隔操作システム</p>
  <div class="cards">
    <a href="/display.html" class="card display">
      <div class="card-icon">📱</div>
      <h2>配信画面 (Device A)</h2>
      <p>配信者のスマホで開きます。<br>カメラ映像＋動画オーバーレイ＋音声再生</p>
    </a>
    <a href="/controller.html" class="card controller">
      <div class="card-icon">🎮</div>
      <h2>コントローラー (Device B)</h2>
      <p>スタッフのスマホで開きます。<br>動画・音楽の再生ボタンを操作</p>
    </a>
  </div>
  <p class="footer">同じルームIDで接続してください</p>
</body>
</html>
