<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - TikTok Comment Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #1a1a2e;
      border: 2px solid #333;
      border-radius: 16px;
      padding: 40px 32px;
      width: 340px;
      text-align: center;
    }
    .login-icon { font-size: 3rem; margin-bottom: 12px; }
    h1 { font-size: 1.3rem; margin-bottom: 24px; }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #444;
      border-radius: 8px;
      background: #0a0a1a;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 16px;
      text-align: center;
    }
    input:focus { outline: none; border-color: #00d4aa; }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #00d4aa;
      color: #000;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #00e8bb; }
    .error { color: #ff4d6a; font-size: 0.85rem; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-icon">💬</div>
    <h1>TikTok Comment Dashboard</h1>
    <input type="text" id="key-input" placeholder="アクセスキーを入力" autofocus>
    <button id="login-btn">ログイン</button>
    <p class="error" id="error-msg">キーが違います</p>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const autoKey = params.get('key');
    if (autoKey) {
      fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: autoKey })
      }).then(r => {
        if (r.ok) location.href = params.get('redirect') || '/?key=' + autoKey;
      });
    }
    document.getElementById('login-btn').addEventListener('click', () => {
      const key = document.getElementById('key-input').value.trim();
      if (!key) return;
      fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key })
      }).then(r => {
        if (r.ok) {
          location.href = '/?key=' + key;
        } else {
          document.getElementById('error-msg').style.display = 'block';
        }
      });
    });
    document.getElementById('key-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-btn').click();
    });
  </script>
</body>
</html>
